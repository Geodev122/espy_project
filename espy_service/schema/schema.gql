# ESPY PROTOCOL - UNIFIED SCHEMA v9.0 (Stable Taxonomy & Adaptive Branding)

# --- Enums ---

enum UserRole {
  VISITOR
  PROFESSIONAL
  INSTITUTION
  ADMIN
  PENDING
}

enum MembershipTier {
  BASIC
  GOLD
  PLATINUM
}

enum TransactionType {
  RECHARGE
  PURCHASE
  REFUND
  BONUS
}

enum InteractionType {
  LIKE
  DISLIKE
  VIEW
  FAVORITE
  SHARE
  CONTACT
}

enum CommunityRequestStatus {
  ACTIVE
  FULFILLED
  EXPIRED
  PENDING
}

enum SupportTicketStatus {
  OPEN
  CLOSED
  PENDING
}

enum OrderStatus {
  PENDING
  APPROVED
  PAID
  CANCELLED
}

enum DeliveryMode {
  ONLINE
  FACE_TO_FACE
  FIELD
}

enum UrgencyLevel {
  LOW
  MEDIUM
  HIGH
  EMERGENCY
}

enum ModerationStatus {
  PENDING
  APPROVED
  FLAGGED
  ARCHIVED
}

# --- 1. Identity & Profiles ---

type User @table(key: "id") {
  id: String! # Firebase UID
  email: String! @unique
  name: String
  role: UserRole! @default(value: VISITOR)
  isActive: Boolean! @default(value: true)
  hasProfile: Boolean! @default(value: false)
  adminNotes: String
  walletBalance: Int! @default(value: 0)
  tokensUsed: Int! @default(value: 0)
  photoUrl: String
  phone: String
  whatsapp: String
  lastActiveAt: Timestamp @default(expr: "request.time")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type ProfessionalProfile @table(key: "id") {
  id: String!
  user: User! @ref(fields: ["id"])
  fullNameAr: String
  specialty: String
  specialtyAr: String
  bioEn: String
  bioAr: String
  isApproved: Boolean! @default(value: false)
  isHonorVerified: Boolean! @default(value: false)
  isProfileValidated: Boolean! @default(value: false)
  verificationDocUrl: String
  membershipTier: MembershipTier @default(value: BASIC)
  serviceSlots: Int! @default(value: 2)
  practicePins: Int! @default(value: 0)
  visibilityExpiresAt: Timestamp
}

type InstitutionProfile @table(key: "id") {
  id: String!
  user: User! @ref(fields: ["id"])
  nameAr: String
  bioEn: String
  bioAr: String
  registrationNumber: String
  isApproved: Boolean! @default(value: false)
  isProfileValidated: Boolean! @default(value: false)
  verificationDocUrl: String
  serviceSlots: Int! @default(value: 5)
  visibilityExpiresAt: Timestamp
}

type VisitorProfile @table(key: "id") {
  id: String!
  user: User! @ref(fields: ["id"])
  interests: [String]
}

# --- 2. Taxonomy & Location ---

type Sector @table(key: "id") {
  id: String!
  nameEn: String!
  nameAr: String
  description: String
  iconName: String
  colorHex: String
  displayOrder: Int @default(value: 999)
  isActive: Boolean! @default(value: true)
  template: Template @ref
}

type Category @table(key: "id") {
  id: String!
  sector: Sector!
  nameEn: String!
  nameAr: String
  description: String
  targetRole: UserRole!
  isOtherCategory: Boolean! @default(value: false)
  isActive: Boolean! @default(value: true)
}

type Template @table(key: "id") {
  id: String! # SectorID or special IDs like "GLOBAL_VISITOR_REQUEST"
  accentColor: String
  iconName: String
  visibleFields: [String]
  configJson: String
  updatedAt: Timestamp @default(expr: "request.time")
}

type Country @table(key: "id") {
  id: String! # ISO Code
  nameEn: String!
  nameAr: String
  isoCode: String
  currency: String
  timezone: String
  flagEmoji: String
}

type Region @table(key: "id") {
  id: String! # Slugified name
  country: Country!
  nameEn: String!
  nameAr: String
  regionCode: String
}

type City @table(key: "id") {
  id: String! # Slugified name
  region: Region!
  nameEn: String!
  nameAr: String
  population: Int
  lat: Float
  lng: Float
}

type PinCategory @table(key: "id") {
  id: String!
  nameEn: String!
  nameAr: String
  iconBase: String
}

type PresenceTag @table(key: "id") {
  id: String!
  nameEn: String!
  nameAr: String
}

type LocationNode @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  city: City!
  pinCategory: PinCategory
  presenceTag: PresenceTag
  lat: Float!
  lng: Float!
  addressEn: String
  addressAr: String
  isMain: Boolean! @default(value: false)
  isVerified: Boolean! @default(value: false)
  label: String
}

# --- 3. Metadata Tags ---

type ServiceTag @table(key: "id") {
  id: String!
  nameEn: String!
  nameAr: String
}

type PriceTag @table(key: "id") {
  id: String!
  nameEn: String!
  nameAr: String
  category: String # "FREE", "PAID", "SUBSIDIZED"
}

# --- 4. Core Business Logic ---

type InstitutionSector @table(key: ["institutionId", "sectorId"]) {
  institution: User! @ref(fields: ["institutionId"])
  institutionId: String!
  sector: Sector! @ref(fields: ["sectorId"])
  sectorId: String!
}

type Service @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  provider: User!
  category: Category!
  sector: Sector!
  titleEn: String!
  titleAr: String
  descriptionEn: String
  descriptionAr: String
  price: Int @default(value: 0)
  priceTag: PriceTag
  deliveryMode: DeliveryMode @default(value: FACE_TO_FACE)
  isActive: Boolean! @default(value: true)
  isAllocated: Boolean! @default(value: false)
  moderationStatus: ModerationStatus! @default(value: PENDING)
  flagReason: String
  imageUrl: String
  visibilityExpiresAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type ServiceListingTag @table(key: ["serviceId", "tagId"]) {
  service: Service! @ref(fields: ["serviceId"])
  serviceId: UUID!
  tag: ServiceTag! @ref(fields: ["tagId"])
  tagId: String!
}

type ServiceRequest @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  sector: Sector!
  descriptionEn: String!
  descriptionAr: String
  urgency: UrgencyLevel @default(value: MEDIUM)
  preferredMode: DeliveryMode @default(value: FACE_TO_FACE)
  lat: Float
  lng: Float
  city: City
  status: CommunityRequestStatus! @default(value: ACTIVE)
  moderationStatus: ModerationStatus! @default(value: APPROVED)
  flagReason: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type ServiceRequestTag @table(key: ["requestId", "tagId"]) {
  request: ServiceRequest! @ref(fields: ["requestId"])
  requestId: UUID!
  tag: ServiceTag! @ref(fields: ["tagId"])
  tagId: String!
}

type Match @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  visitor: User!
  professional: User!
  status: String! @default(value: "requested")
  createdAt: Timestamp! @default(expr: "request.time")
}

# --- 4. Ledger & Resource Orders ---

type ResourceOrder @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  pinsCount: Int! @default(value: 0)
  slotsCount: Int! @default(value: 0)
  broadcastsCount: Int! @default(value: 0)
  totalCost: Int! @default(value: 0)
  status: OrderStatus! @default(value: PENDING)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type WalletTransaction @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  amount: Int!
  type: TransactionType!
  referenceId: String
  description: String
  invoiceNumber: String
  isRefunded: Boolean @default(value: false)
  parentTransactionId: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type RechargeCard @table(key: "id") {
  id: String! # Code
  tokenValue: Int!
  status: String! @default(value: "active")
  redeemedBy: User
  redeemedAt: Timestamp
}

type Interaction @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  actor: User!
  targetId: String!
  type: InteractionType!
  createdAt: Timestamp! @default(expr: "request.time")
}

# --- 5. Reputation & Safety ---

type Review @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  author: User!
  targetUser: User
  targetService: Service
  rating: Int!
  comment: String
  isApproved: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
}

type Report @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  reporter: User!
  targetId: String!
  targetType: String!
  reason: String!
  status: String! @default(value: "pending")
  adminNote: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type SosAlert @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  lat: Float!
  lng: Float!
  status: String! @default(value: "active")
  timestamp: Timestamp! @default(expr: "request.time")
}

# --- 6. Communications ---

type SystemNotification @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  recipient: User!
  title: String!
  message: String!
  type: String!
  isRead: Boolean! @default(value: false)
  timestamp: Timestamp! @default(expr: "request.time")
}

type Broadcast @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  sender: User!
  title: String!
  message: String!
  targetCountry: String @default(value: "GLOBAL")
  targetRegion: String # Changed to String to match Region ID
  targetCity: String   # Changed to String to match City ID
  status: String! @default(value: "queued")
  moderationStatus: ModerationStatus! @default(value: PENDING)
  flagReason: String
  targetRole: UserRole
  targetSector: Sector
  targetCategory: Category
  scheduledAt: Timestamp
  openCount: Int @default(value: 0)
  createdAt: Timestamp! @default(expr: "request.time")
}

type Announcement @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  titleEn: String!
  titleAr: String
  contentEn: String!
  contentAr: String
  category: String!
  status: String! @default(value: "approved")
  createdAt: Timestamp! @default(expr: "request.time")
}

type SupportTicket @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  subject: String!
  message: String!
  status: SupportTicketStatus! @default(value: OPEN)
  adminNote: String
  createdAt: Timestamp! @default(expr: "request.time")
}

# --- 7. Administration ---

type AdminLog @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  admin: User!
  action: String!
  entityId: String!
  entityType: String!
  details: String
  timestamp: Timestamp! @default(expr: "request.time")
}

type AppConfig @table(key: "key") {
  key: String!
  value: String!
}

# --- 8. Operational Governance ---

type SosNumber @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  country: Country!
  sector: Sector
  category: Category
  labelEn: String!
  labelAr: String
  number: String!
  categoryIcon: String
  isVerified: Boolean @default(value: true)
  isActive: Boolean! @default(value: true)
}

type TokenPackage @table(key: "id") {
  id: String! # Unique package identifier, e.g., "tier_1_pro"
  nameEn: String!
  nameAr: String
  tokenCount: Int!
  price: Float!
  discountRate: Float @default(value: 0.0)
  targetRole: UserRole! @default(value: VISITOR)
  isActive: Boolean! @default(value: true)
}

type ElementPricing @table(key: "id") {
  id: String! # PIN, SLOT, BROADCAST
  tokenCost: Int!
  validityDays: Int @default(value: 30)
  updatedAt: Timestamp @default(expr: "request.time")
}

# --- 9. Analytics & Performance ---

type AnalyticsSnapshot @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  date: Date!
  totalUsers: Int!
  totalRevenue: Float!
  tokensBurned: Int!
  activeRequests: Int!
  topSectorId: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type ServiceMetric @table(key: "serviceId") {
  service: Service! @ref(fields: ["serviceId"])
  serviceId: UUID!
  views: Int @default(value: 0)
  contacts: Int @default(value: 0)
  shares: Int @default(value: 0)
  updatedAt: Timestamp @default(expr: "request.time")
}
