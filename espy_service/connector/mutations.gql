# ESPY PROTOCOL - DATA CONNECT MUTATIONS v9.0

# --- 1. Identity & Profile ---

mutation CreateUser($id: String!, $email: String!, $name: String, $role: UserRole!) @auth(expr: "auth.uid == id") {
  user_insert(data: {
    id: $id,
    email: $email,
    name: $name,
    role: $role
  })
}

mutation UpdateUserProfile($id: String!, $name: String, $photoUrl: String, $phone: String, $whatsapp: String) @auth(expr: "auth.uid == id") {
  user_update(key: { id: $id }, data: {
    name: $name,
    photoUrl: $photoUrl,
    phone: $phone,
    whatsapp: $whatsapp,
    updatedAt_expr: "request.time"
  })
}

mutation UpsertProfessionalProfile(
  $id: String!,
  $fullNameAr: String,
  $specialty: String,
  $specialtyAr: String,
  $bioEn: String,
  $bioAr: String
) @auth(expr: "auth.uid == id") {
  professionalProfile_upsert(data: {
    id: $id,
    fullNameAr: $fullNameAr,
    specialty: $specialty,
    specialtyAr: $specialtyAr,
    bioEn: $bioEn,
    bioAr: $bioAr
  })
}

mutation UpsertInstitutionProfile(
  $id: String!,
  $nameAr: String,
  $bioEn: String,
  $bioAr: String,
  $registrationNumber: String
) @auth(expr: "auth.uid == id") {
  institutionProfile_upsert(data: {
    id: $id,
    nameAr: $nameAr,
    bioEn: $bioEn,
    bioAr: $bioAr,
    registrationNumber: $registrationNumber
  })
}

# --- 2. Service & Discovery ---

mutation CreateService($categoryId: String!, $sectorId: String!, $titleEn: String!, $price: Int!, $priceTagId: String) @auth(level: USER) {
  service_insert(data: {
    providerId_expr: "auth.uid",
    categoryId: $categoryId,
    sectorId: $sectorId,
    titleEn: $titleEn,
    price: $price,
    priceTagId: $priceTagId,
    moderationStatus: PENDING
  })
}

mutation UpdateService($id: UUID!, $isActive: Boolean, $isAllocated: Boolean) @auth(level: USER) {
  service_update(
    first: { where: { id: { eq: $id }, provider: { id: { eq_expr: "auth.uid" } } } },
    data: {
      isActive: $isActive,
      isAllocated: $isAllocated
    }
  )
}

mutation CreateLocationNode($cityId: String!, $label: String!, $lat: Float!, $lng: Float!, $isMain: Boolean!) @auth(level: USER) {
  locationNode_insert(data: {
    userId_expr: "auth.uid",
    cityId: $cityId,
    label: $label,
    lat: $lat,
    lng: $lng,
    isMain: $isMain
  })
}

# --- 3. Financial & Resource Orders ---

mutation CreateResourceOrder($pins: Int!, $slots: Int!, $broadcasts: Int!, $total: Int!) @auth(level: USER) {
  resourceOrder_insert(data: {
    userId_expr: "auth.uid",
    pinsCount: $pins,
    slotsCount: $slots,
    broadcastsCount: $broadcasts,
    totalCost: $total,
    status: PENDING
  })
}

mutation UpdateResourceOrder($id: UUID!, $pins: Int!, $slots: Int!, $broadcasts: Int!, $total: Int!) @auth(level: USER) {
  resourceOrder_update(
    first: { where: { id: { eq: $id }, user: { id: { eq_expr: "auth.uid" } } } },
    data: {
      pinsCount: $pins,
      slotsCount: $slots,
      broadcastsCount: $broadcasts,
      totalCost: $total,
      updatedAt_expr: "request.time"
    }
  )
}

# --- 4. Community & Interaction ---

mutation PostServiceRequest($sectorId: String!, $descriptionEn: String!, $urgency: UrgencyLevel, $preferredMode: DeliveryMode) @auth(level: USER) {
  serviceRequest_insert(data: {
    userId_expr: "auth.uid",
    sectorId: $sectorId,
    descriptionEn: $descriptionEn,
    urgency: $urgency,
    preferredMode: $preferredMode,
    moderationStatus: APPROVED
  })
}

mutation RecordInteraction($targetId: String!, $type: InteractionType!) @auth(level: USER) {
  interaction_insert(data: {
    actorId_expr: "auth.uid",
    targetId: $targetId,
    type: $type
  })
}

# --- 5. Administration & Taxonomy ---

mutation UpsertCountry($id: String!, $nameEn: String!, $nameAr: String!, $isoCode: String, $currency: String, $flagEmoji: String) @auth(level: NO_ACCESS) {
  country_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr, isoCode: $isoCode, currency: $currency, flagEmoji: $flagEmoji })
}

mutation UpsertRegion($id: String!, $countryId: String!, $nameEn: String!, $nameAr: String!, $regionCode: String) @auth(level: NO_ACCESS) {
  region_upsert(data: { id: $id, countryId: $countryId, nameEn: $nameEn, nameAr: $nameAr, regionCode: $regionCode })
}

mutation UpsertCity($id: String!, $regionId: String!, $nameEn: String!, $nameAr: String!, $lat: Float, $lng: Float) @auth(level: NO_ACCESS) {
  city_upsert(data: { id: $id, regionId: $regionId, nameEn: $nameEn, nameAr: $nameAr, lat: $lat, lng: $lng })
}

mutation DeleteGeographyEntity($id: String!) @auth(level: NO_ACCESS) {
  country_delete(key: { id: $id })
}

mutation UpdateSectorBranding($id: String!, $iconName: String, $colorHex: String, $nameEn: String, $nameAr: String) @auth(level: NO_ACCESS) {
  sector_update(key: { id: $id }, data: { iconName: $iconName, colorHex: $colorHex, nameEn: $nameEn, nameAr: $nameAr })
}

mutation UpdateCategory($id: String!, $sectorId: String!, $nameEn: String!, $nameAr: String!, $targetRole: UserRole!) @auth(level: NO_ACCESS) {
  category_update(key: { id: $id }, data: {
    sectorId: $sectorId,
    nameEn: $nameEn,
    nameAr: $nameAr,
    targetRole: $targetRole
  })
}

mutation UpsertServiceTag($id: String!, $nameEn: String!, $nameAr: String!) @auth(level: NO_ACCESS) {
  serviceTag_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr })
}

mutation UpsertPriceTag($id: String!, $nameEn: String!, $nameAr: String!, $category: String) @auth(level: NO_ACCESS) {
  priceTag_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr, category: $category })
}

mutation UpsertPinCategory($id: String!, $nameEn: String!, $nameAr: String!, $iconBase: String) @auth(level: NO_ACCESS) {
  pinCategory_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr, iconBase: $iconBase })
}

mutation UpsertPresenceTag($id: String!, $nameEn: String!, $nameAr: String!) @auth(level: NO_ACCESS) {
  presenceTag_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr })
}

mutation ModerateService($id: UUID!, $status: ModerationStatus!, $reason: String) @auth(level: NO_ACCESS) {
  service_update(key: { id: $id }, data: {
    moderationStatus: $status,
    flagReason: $reason
  })
}

mutation ModerateRequest($id: UUID!, $status: ModerationStatus!, $reason: String) @auth(level: NO_ACCESS) {
  serviceRequest_update(key: { id: $id }, data: {
    moderationStatus: $status,
    flagReason: $reason
  })
}

mutation UpsertTemplate($id: String!, $visibleFields: [String!], $accentColor: String, $iconName: String, $configJson: String) @auth(level: NO_ACCESS) {
  template_upsert(data: {
    id: $id,
    visibleFields: $visibleFields,
    accentColor: $accentColor,
    iconName: $iconName,
    configJson: $configJson
  })
}

mutation CreateLocalizedBroadcast($title: String!, $message: String!, $country: String, $region: String, $city: String) @auth(level: NO_ACCESS) {
  broadcast_insert(data: {
    senderId_expr: "auth.uid",
    title: $title,
    message: $message,
    targetCountry: $country,
    targetRegion: $region,
    targetCity: $city,
    status: "queued"
  })
}

mutation ApproveResourceOrder($id: UUID!) @auth(level: NO_ACCESS) {
  resourceOrder_update(key: { id: $id }, data: {
    status: APPROVED
  })
}
