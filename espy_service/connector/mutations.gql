# ESPY PROTOCOL - DATA CONNECT MUTATIONS v8.2 (Sector-Based Adaptive Branding)

# --- 1. Identity & Profile ---

mutation CreateUser($id: String!, $email: String!, $name: String, $role: UserRole!) @auth(expr: "auth.uid == id") {
  user_insert(data: {
    id: $id,
    email: $email,
    name: $name,
    role: $role
  })
}

mutation UpsertUser($id: String!, $email: String!, $name: String, $role: UserRole!) @auth(expr: "auth.uid == id") {
  user_upsert(data: {
    id: $id,
    email: $email,
    name: $name,
    role: $role,
    isActive: true,
    hasProfile: false
  })
}

mutation UpdateUserLastActive($id: String!) @auth(expr: "auth.uid == id") {
  user_update(key: { id: $id }, data: {
    lastActiveAt_expr: "request.time",
    updatedAt_expr: "request.time"
  })
}

mutation UpdateUserProfile($id: String!, $name: String, $photoUrl: String, $phone: String, $whatsapp: String) @auth(expr: "auth.uid == id") {
  user_update(key: { id: $id }, data: {
    name: $name,
    photoUrl: $photoUrl,
    phone: $phone,
    whatsapp: $whatsapp,
    updatedAt_expr: "request.time"
  })
}

mutation UpsertProfessionalProfile(
  $id: String!,
  $fullNameAr: String,
  $specialty: String,
  $specialtyAr: String,
  $bioEn: String,
  $bioAr: String
) @auth(expr: "auth.uid == id") {
  professionalProfile_upsert(data: {
    id: $id,
    fullNameAr: $fullNameAr,
    specialty: $specialty,
    specialtyAr: $specialtyAr,
    bioEn: $bioEn,
    bioAr: $bioAr
  })
}

mutation UpsertInstitutionProfile(
  $id: String!,
  $nameAr: String,
  $bioEn: String,
  $bioAr: String,
  $registrationNumber: String
) @auth(expr: "auth.uid == id") {
  institutionProfile_upsert(data: {
    id: $id,
    nameAr: $nameAr,
    bioEn: $bioEn,
    bioAr: $bioAr,
    registrationNumber: $registrationNumber
  })
}

# --- 2. Service & Discovery ---

mutation CreateService($categoryId: String!, $sectorId: String!, $titleEn: String!, $price: Int!, $priceTagId: String) @auth(level: USER) {
  service_insert(data: {
    providerId_expr: "auth.uid",
    categoryId: $categoryId,
    sectorId: $sectorId,
    titleEn: $titleEn,
    price: $price,
    priceTagId: $priceTagId,
    moderationStatus: PENDING
  })
}

mutation UpdateService($id: UUID!, $isActive: Boolean, $isAllocated: Boolean) @auth(level: USER) {
  service_update(
    first: { where: { id: { eq: $id }, provider: { id: { eq_expr: "auth.uid" } } } },
    data: {
      isActive: $isActive,
      isAllocated: $isAllocated
    }
  )
}

mutation CreateLocationNode($cityId: String!, $label: String!, $lat: Float!, $lng: Float!, $isMain: Boolean!) @auth(level: USER) {
  locationNode_insert(data: {
    userId_expr: "auth.uid",
    cityId: $cityId,
    label: $label,
    lat: $lat,
    lng: $lng,
    isMain: $isMain
  })
}

# --- 3. Financial & Resource Orders ---

mutation CreateResourceOrder($pins: Int!, $slots: Int!, $broadcasts: Int!, $total: Int!) @auth(level: USER) {
  resourceOrder_insert(data: {
    userId_expr: "auth.uid",
    pinsCount: $pins,
    slotsCount: $slots,
    broadcastsCount: $broadcasts,
    totalCost: $total,
    status: PENDING
  })
}

mutation UpdateResourceOrder($id: UUID!, $pins: Int!, $slots: Int!, $broadcasts: Int!, $total: Int!) @auth(level: USER) {
  resourceOrder_update(
    first: { where: { id: { eq: $id }, user: { id: { eq_expr: "auth.uid" } } } },
    data: {
      pinsCount: $pins,
      slotsCount: $slots,
      broadcastsCount: $broadcasts,
      totalCost: $total,
      updatedAt_expr: "request.time"
    }
  )
}

mutation SpendTokens($userId: String!, $cost: Int!, $ledgerAmount: Int!, $type: TransactionType = PURCHASE, $description: String!) @auth(expr: "auth.uid == userId") {
  user_update(key: { id: $userId }, data: {
    walletBalance_update: { dec: $cost },
    tokensUsed_update: { inc: $cost },
    updatedAt_expr: "request.time"
  })
  walletTransaction_insert(data: {
    userId: $userId,
    amount: $ledgerAmount,
    type: $type,
    description: $description
  })
}

# --- 4. Community & Interaction ---

mutation PostServiceRequest($sectorId: String!, $descriptionEn: String!, $urgency: UrgencyLevel, $preferredMode: DeliveryMode) @auth(level: USER) {
  serviceRequest_insert(data: {
    userId_expr: "auth.uid",
    sectorId: $sectorId,
    descriptionEn: $descriptionEn,
    urgency: $urgency,
    preferredMode: $preferredMode,
    moderationStatus: APPROVED
  })
}

mutation RecordInteraction($targetId: String!, $type: InteractionType!) @auth(level: USER) {
  interaction_insert(data: {
    actorId_expr: "auth.uid",
    targetId: $targetId,
    type: $type
  })
}

mutation UpdateUserAdmin($id: String!, $name: String, $role: UserRole, $isActive: Boolean, $phone: String, $whatsapp: String, $notes: String, $balance: Int) @auth(level: NO_ACCESS) {
  user_update(key: { id: $id }, data: {
    name: $name,
    role: $role,
    isActive: $isActive,
    phone: $phone,
    whatsapp: $whatsapp,
    adminNotes: $notes,
    walletBalance: $balance,
    updatedAt_expr: "request.time"
  })
}

mutation ToggleUserActiveStatus($id: String!, $isActive: Boolean!) @auth(level: NO_ACCESS) {
  user_update(key: { id: $id }, data: {
    isActive: $isActive,
    updatedAt_expr: "request.time"
  })
}

mutation VerifyUserProfessional($id: String!, $isApproved: Boolean!) @auth(level: NO_ACCESS) {
  professionalProfile_update(key: { id: $id }, data: {
    isApproved: $isApproved
  })
}

mutation VerifyUserInstitution($id: String!, $isApproved: Boolean!) @auth(level: NO_ACCESS) {
  institutionProfile_update(key: { id: $id }, data: {
    isApproved: $isApproved
  })
}

# --- 5. Administration & Taxonomy ---

mutation UpsertCountry($id: String!, $nameEn: String!, $nameAr: String!, $isoCode: String, $currency: String, $flagEmoji: String) @auth(level: NO_ACCESS) {
  country_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr, isoCode: $isoCode, currency: $currency, flagEmoji: $flagEmoji })
}

mutation UpsertRegion($id: String!, $countryId: String!, $nameEn: String!, $nameAr: String!, $regionCode: String) @auth(level: NO_ACCESS) {
  region_upsert(data: { id: $id, countryId: $countryId, nameEn: $nameEn, nameAr: $nameAr, regionCode: $regionCode })
}

mutation UpsertCity($id: String!, $regionId: String!, $nameEn: String!, $nameAr: String!, $lat: Float, $lng: Float) @auth(level: NO_ACCESS) {
  city_upsert(data: { id: $id, regionId: $regionId, nameEn: $nameEn, nameAr: $nameAr, lat: $lat, lng: $lng })
}

mutation DeleteGeographyEntity($id: String!) @auth(level: NO_ACCESS) {
  country_delete(key: { id: $id })
}

mutation UpdateSectorBranding($id: String!, $iconName: String, $colorHex: String, $nameEn: String, $nameAr: String) @auth(level: NO_ACCESS) {
  sector_update(key: { id: $id }, data: { iconName: $iconName, colorHex: $colorHex, nameEn: $nameEn, nameAr: $nameAr })
}

mutation UpsertServiceTag($id: String!, $nameEn: String!, $nameAr: String!) @auth(level: NO_ACCESS) {
  serviceTag_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr })
}

mutation UpsertPriceTag($id: String!, $nameEn: String!, $nameAr: String!, $category: String) @auth(level: NO_ACCESS) {
  priceTag_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr, category: $category })
}

mutation UpsertPinCategory($id: String!, $nameEn: String!, $nameAr: String!, $iconBase: String) @auth(level: NO_ACCESS) {
  pinCategory_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr, iconBase: $iconBase })
}

mutation UpsertPresenceTag($id: String!, $nameEn: String!, $nameAr: String!) @auth(level: NO_ACCESS) {
  presenceTag_upsert(data: { id: $id, nameEn: $nameEn, nameAr: $nameAr })
}

mutation CreateRechargeCard($code: String!, $value: Int!, $pins: Int!, $slots: Int!) @auth(level: NO_ACCESS) {
  rechargeCard_insert(data: {
    id: $code,
    tokenValue: $value,
    status: "active"
  })
}

mutation ModerateService($id: UUID!, $status: ModerationStatus!, $reason: String) @auth(level: NO_ACCESS) {
  service_update(key: { id: $id }, data: {
    moderationStatus: $status,
    flagReason: $reason
  })
}

mutation ModerateRequest($id: UUID!, $status: ModerationStatus!, $reason: String) @auth(level: NO_ACCESS) {
  serviceRequest_update(key: { id: $id }, data: {
    moderationStatus: $status,
    flagReason: $reason
  })
}

mutation UpsertTemplate($id: String!, $visibleFields: [String!], $accentColor: String, $iconName: String, $configJson: String) @auth(level: NO_ACCESS) {
  template_upsert(data: {
    id: $id,
    visibleFields: $visibleFields,
    accentColor: $accentColor,
    iconName: $iconName,
    configJson: $configJson
  })
}

mutation CreateLocalizedBroadcast($title: String!, $message: String!, $country: String, $region: String, $city: String, $status: ModerationStatus = PENDING) @auth(level: USER) {
  broadcast_insert(data: {
    senderId_expr: "auth.uid",
    title: $title,
    message: $message,
    targetCountry: $country,
    targetRegion: $region,
    targetCity: $city,
    status: "queued",
    moderationStatus: $status
  })
}

mutation ApproveResourceOrder($id: UUID!) @auth(level: NO_ACCESS) {
  resourceOrder_update(key: { id: $id }, data: {
    status: APPROVED
  })
}

mutation ApproveProfessional($id: String!, $isApproved: Boolean!) @auth(level: NO_ACCESS) {
  professionalProfile_update(key: { id: $id }, data: {
    isApproved: $isApproved
  })
}

mutation ValidateProfile($id: String!) @auth(level: NO_ACCESS) {
  professionalProfile_update(key: { id: $id }, data: {
    isProfileValidated: true
  })
}

mutation ValidateInstitutionProfile($id: String!) @auth(level: NO_ACCESS) {
  institutionProfile_update(key: { id: $id }, data: {
    isProfileValidated: true
  })
}

mutation ResolveSupportTicket($id: UUID!, $adminNote: String) @auth(level: NO_ACCESS) {
  supportTicket_update(key: { id: $id }, data: {
    status: CLOSED,
    adminNote: $adminNote
  })
}

# --- 6. Operational Governance ---

mutation UpsertSosNumber($id: UUID, $countryId: String!, $sectorId: String, $categoryId: String, $labelEn: String!, $labelAr: String, $number: String!, $isActive: Boolean!) @auth(level: NO_ACCESS) {
  sosNumber_upsert(data: {
    id: $id,
    countryId: $countryId,
    sectorId: $sectorId,
    categoryId: $categoryId,
    labelEn: $labelEn,
    labelAr: $labelAr,
    number: $number,
    isActive: $isActive
  })
}

mutation UpsertTokenPackage($id: String!, $nameEn: String!, $nameAr: String, $tokenCount: Int!, $price: Float!, $discountRate: Float, $targetRole: UserRole!, $isActive: Boolean!) @auth(level: NO_ACCESS) {
  tokenPackage_upsert(data: {
    id: $id,
    nameEn: $nameEn,
    nameAr: $nameAr,
    tokenCount: $tokenCount,
    price: $price,
    discountRate: $discountRate,
    targetRole: $targetRole,
    isActive: $isActive
  })
}

mutation UpdateElementPricing($id: String!, $tokenCost: Int!, $validityDays: Int) @auth(level: NO_ACCESS) {
  elementPricing_upsert(data: {
    id: $id,
    tokenCost: $tokenCost,
    validityDays: $validityDays,
    updatedAt_expr: "request.time"
  })
}

mutation ModerateBroadcast($id: UUID!, $status: ModerationStatus!, $reason: String) @auth(level: NO_ACCESS) {
  broadcast_update(key: { id: $id }, data: {
    moderationStatus: $status,
    flagReason: $reason
  })
}

# --- 7. Analytics & advanced Governance ---

mutation RefundTransaction($id: UUID!, $reason: String!) @auth(level: NO_ACCESS) {
  walletTransaction_update(key: { id: $id }, data: {
    isRefunded: true,
    description: $reason
  })
}

mutation UpdateAppConfig($key: String!, $value: String!) @auth(level: NO_ACCESS) {
  appConfig_upsert(data: {
    key: $key,
    value: $value
  })
}

mutation CreateAnalyticsSnapshot(
  $date: Date!,
  $totalUsers: Int!,
  $totalRevenue: Float!,
  $tokensBurned: Int!,
  $activeRequests: Int!,
  $topSectorId: String
) @auth(level: NO_ACCESS) {
  analyticsSnapshot_insert(data: {
    date: $date,
    totalUsers: $totalUsers,
    totalRevenue: $totalRevenue,
    tokensBurned: $tokensBurned,
    activeRequests: $activeRequests,
    topSectorId: $topSectorId
  })
}

mutation UpsertServiceMetric($serviceId: UUID!, $views: Int, $contacts: Int, $shares: Int) @auth(level: NO_ACCESS) {
  serviceMetric_upsert(data: {
    serviceId: $serviceId,
    views: $views,
    contacts: $contacts,
    shares: $shares,
    updatedAt_expr: "request.time"
  })
}

mutation IncrementServiceMetric($serviceId: UUID!, $views: Int = 0, $contacts: Int = 0, $shares: Int = 0) @auth(level: PUBLIC) {
  serviceMetric_update(key: { serviceId: $serviceId }, data: {
    views_update: { inc: $views },
    contacts_update: { inc: $contacts },
    shares_update: { inc: $shares },
    updatedAt_expr: "request.time"
  })
}
