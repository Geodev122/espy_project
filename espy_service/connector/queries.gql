# ESPY PROTOCOL - DATA CONNECT QUERIES v9.1 (Normalized Selection Sets)

# --- 1. Identity & Profile ---

query GetUser($uid: String!) @auth(expr: "auth.uid == uid") {
  user(key: { id: $uid }) {
    id
    email
    name
    role
    isActive
    hasProfile
    adminNotes
    walletBalance
    tokensUsed
    photoUrl
    phone
    whatsapp
    createdAt
    updatedAt
    professionalProfile_on_user {
      id
      specialty
      isApproved
      isProfileValidated
      verificationDocUrl
      membershipTier
      visibilityExpiresAt
    }
    institutionProfile_on_user {
      id
      nameAr
      registrationNumber
      isApproved
      isProfileValidated
      verificationDocUrl
      visibilityExpiresAt
    }
    visitorProfile_on_user {
      id
      interests
    }
  }
}

query GetProfessionalDetails($uid: String!) @auth(level: PUBLIC) {
  professionalProfile(key: { id: $uid }) {
    id
    fullNameAr
    specialty
    specialtyAr
    bioEn
    bioAr
    isApproved
    isHonorVerified
    isProfileValidated
    verificationDocUrl
    membershipTier
    serviceSlots
    practicePins
    visibilityExpiresAt
    user {
      id
      email
      name
      photoUrl
      whatsapp
    }
  }
}

# --- 2. Discovery & Search ---

query ListSectors @auth(level: PUBLIC) {
  sectors(orderBy: [{ displayOrder: ASC }]) {
    id
    nameEn
    nameAr
    iconName
    colorHex
    description
    template {
      id
      accentColor
      iconName
      visibleFields
    }
  }
}

query ListCategories($sectorId: String) @auth(level: PUBLIC) {
  categories(where: { sector: { id: { eq: $sectorId } } }) {
    id
    nameEn
    nameAr
    targetRole
    sector { id }
  }
}

query ListRegions($countryId: String!) @auth(level: PUBLIC) {
  regions(where: { country: { id: { eq: $countryId } } }) {
    id
    nameEn
    nameAr
    regionCode
    country { id }
  }
}

query ListCities($regionId: String!) @auth(level: PUBLIC) {
  cities(where: { region: { id: { eq: $regionId } } }) {
    id
    nameEn
    nameAr
    lat
    lng
    region { id }
  }
}

query ListMetadataTags @auth(level: PUBLIC) {
  serviceTags { id nameEn nameAr }
  priceTags { id nameEn nameAr category }
  pinCategories { id nameEn nameAr iconBase }
  presenceTags { id nameEn nameAr }
}

query ListActiveServices($categoryId: String, $sectorId: String) @auth(level: PUBLIC) {
  services(where: {
    _and: [
      { isActive: { eq: true } },
      { moderationStatus: { eq: APPROVED } },
      { category: { id: { eq: $categoryId } } },
      { sector: { id: { eq: $sectorId } } }
    ]
  }) {
    id
    titleEn
    titleAr
    price
    imageUrl
    deliveryMode
    moderationStatus
    flagReason
    category { id nameEn nameAr }
    sector {
      id
      template { id accentColor iconName visibleFields }
    }
    provider {
      id
      name
      photoUrl
    }
  }
}

query SearchServices($query: String, $minPrice: Int, $maxPrice: Int) @auth(level: PUBLIC) {
  services(where: {
    _and: [
      { isActive: { eq: true } },
      { moderationStatus: { eq: APPROVED } },
      { titleEn: { contains: $query } },
      { price: { ge: $minPrice } },
      { price: { le: $maxPrice } }
    ]
  }) {
    id
    titleEn
    price
    imageUrl
    provider {
      id
      name
    }
  }
}

query ListCountries @auth(level: PUBLIC) {
  countries {
    id
    nameEn
    nameAr
    flagEmoji
    isoCode
    currency
  }
}

query ListLocationNodes($userId: String!) @auth(level: PUBLIC) {
  locationNodes(where: { user: { id: { eq: $userId } } }) {
    id
    label
    city { id nameEn nameAr }
    lat
    lng
    isMain
  }
}

# --- 3. Interactions & Community ---

query ListFavoriteIds($actorId: String!) @auth(expr: "auth.uid == actorId") {
  interactions(where: {
    _and: [
      { actor: { id: { eq: $actorId } } },
      { type: { eq: FAVORITE } }
    ]
  }) {
    targetId
  }
}

query ListContactedIds($actorId: String!) @auth(expr: "auth.uid == actorId") {
  interactions(where: {
    _and: [
      { actor: { id: { eq: $actorId } } },
      { type: { eq: CONTACT } }
    ]
  }) {
    targetId
  }
}

query ListInteractions($actorId: String!, $type: InteractionType!) @auth(expr: "auth.uid == actorId") {
  interactions(where: {
    _and: [
      { actor: { id: { eq: $actorId } } },
      { type: { eq: $type } }
    ]
  }) {
    targetId
  }
}

query ListServiceRequests($sectorId: String, $status: CommunityRequestStatus = ACTIVE) @auth(level: USER) {
  serviceRequests(
    where: {
      _and: [
        { status: { eq: $status } },
        { moderationStatus: { eq: APPROVED } },
        { sector: { id: { eq: $sectorId } } }
      ]
    },
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    descriptionEn
    descriptionAr
    urgency
    preferredMode
    status
    createdAt
    user {
      id
      name
    }
    sector { id }
  }
}

# --- 4. Ledger & Resource Orders ---

query GetWalletTransactions($userId: String!) @auth(expr: "auth.uid == userId") {
  walletTransactions(where: { user: { id: { eq: $userId } } }, orderBy: [{ createdAt: DESC }]) {
    id
    type
    amount
    referenceId
    description
    createdAt
  }
}

query GetActiveResourceOrder($userId: String!) @auth(expr: "auth.uid == userId") {
  resourceOrders(where: {
    _and: [
      { user: { id: { eq: $userId } } },
      { status: { ne: PAID } },
      { status: { ne: CANCELLED } }
    ]
  }, orderBy: [{ createdAt: DESC }], limit: 1) {
    id
    pinsCount
    slotsCount
    broadcastsCount
    totalCost
    status
    createdAt
    user { id }
  }
}

# --- 5. Administration & Audit ---

query SearchUsersAdmin($query: String, $role: UserRole, $hasProfile: Boolean, $isActive: Boolean) @auth(level: NO_ACCESS) {
  users(
    where: {
      _and: [
        { email: { contains: $query } },
        { role: { eq: $role } },
        { hasProfile: { eq: $hasProfile } },
        { isActive: { eq: $isActive } }
      ]
    },
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    email
    name
    role
    isActive
    hasProfile
    phone
    whatsapp
    createdAt
  }
}

query GetAuditDetails($id: String!) @auth(level: NO_ACCESS) {
  user(key: { id: $id }) {
    id
    email
    name
    role
    isActive
    hasProfile
    photoUrl
    phone
    whatsapp
    walletBalance
    adminNotes
    createdAt
    updatedAt
    professionalProfile_on_user {
      id
      fullNameAr
      specialty
      isApproved
      isProfileValidated
      verificationDocUrl
      membershipTier
      visibilityExpiresAt
    }
    institutionProfile_on_user {
      id
      nameAr
      registrationNumber
      isApproved
      isProfileValidated
      verificationDocUrl
      visibilityExpiresAt
    }
    walletTransactions_on_user(orderBy: [{ createdAt: DESC }], limit: 10) {
      id
      amount
      type
      description
      createdAt
    }
  }
}

query ListRechargeCards @auth(level: NO_ACCESS) {
  rechargeCards(orderBy: [{ redeemedAt: DESC }]) {
    id
    tokenValue
    status
    redeemedAt
    redeemedBy { id email }
  }
}

query ListPendingApprovals @auth(level: NO_ACCESS) {
  professionalProfiles(where: { isApproved: { eq: false } }) {
    id
    fullNameAr
    user {
      id
      email
      createdAt
    }
  }
}

query ListPendingOrders @auth(level: NO_ACCESS) {
  resourceOrders(where: { status: { eq: PENDING } }, orderBy: [{ createdAt: DESC }]) {
    id
    pinsCount
    slotsCount
    broadcastsCount
    totalCost
    status
    user {
      id
      email
      name
    }
  }
}

query ListSupportTickets($status: SupportTicketStatus) @auth(level: NO_ACCESS) {
  supportTickets(where: { status: { eq: $status } }, orderBy: [{ createdAt: DESC }]) {
    id
    subject
    message
    status
    createdAt
    user { id email name }
  }
}

# --- Service Moderation Queries ---

query ListServiceModerationQueue($status: ModerationStatus = PENDING) @auth(level: NO_ACCESS) {
  services(where: { moderationStatus: { eq: $status } }, orderBy: [{ createdAt: DESC }]) {
    id
    titleEn
    titleAr
    price
    imageUrl
    deliveryMode
    moderationStatus
    flagReason
    category { id nameEn nameAr }
    sector {
      id
      nameEn
      nameAr
      template { id accentColor iconName visibleFields }
    }
    provider { id name photoUrl email }
  }
}

query ListRequestModerationQueue($status: ModerationStatus = PENDING) @auth(level: NO_ACCESS) {
  serviceRequests(where: { moderationStatus: { eq: $status } }, orderBy: [{ createdAt: DESC }]) {
    id
    descriptionEn
    descriptionAr
    urgency
    preferredMode
    status
    moderationStatus
    flagReason
    createdAt
    sector {
      id
      nameEn
      nameAr
      template { id accentColor iconName visibleFields }
    }
    user { id name email }
  }
}

query ListTemplates @auth(level: PUBLIC) {
  templates {
    id
    accentColor
    iconName
    visibleFields
    configJson
  }
}

# --- 6. Operational Governance ---

query ListSosNumbers($countryId: String, $sectorId: String, $categoryId: String) @auth(level: PUBLIC) {
  sosNumbers(where: {
    _and: [
      { country: { id: { eq: $countryId } } },
      { sector: { id: { eq: $sectorId } } },
      { category: { id: { eq: $categoryId } } },
      { isActive: { eq: true } }
    ]
  }) {
    id
    labelEn
    labelAr
    number
    country { id }
    sector { id }
    category { id }
  }
}

query ListTokenPackages($targetRole: UserRole, $isActive: Boolean = true) @auth(level: PUBLIC) {
  tokenPackages(where: {
    _and: [
      { targetRole: { eq: $targetRole } },
      { isActive: { eq: $isActive } }
    ]
  }) {
    id
    nameEn
    nameAr
    tokenCount
    price
    discountRate
    targetRole
    isActive
  }
}

query ListElementPricing @auth(level: PUBLIC) {
  elementPricings {
    id
    tokenCost
    validityDays
    updatedAt
  }
}

query ListBroadcastModerationQueue($status: ModerationStatus = PENDING) @auth(level: NO_ACCESS) {
  broadcasts(where: { moderationStatus: { eq: $status } }, orderBy: [{ createdAt: DESC }]) {
    id
    title
    message
    targetCountry
    targetRegion
    targetCity
    status
    moderationStatus
    flagReason
    targetRole
    targetSector { id nameEn }
    targetCategory { id nameEn }
    sender { id name email }
    createdAt
  }
}

query ListActiveBroadcasts($country: String, $role: UserRole) @auth(level: PUBLIC) {
  broadcasts(where: {
    _and: [
      { moderationStatus: { eq: APPROVED } },
      { _or: [
        { targetCountry: { eq: $country } },
        { targetCountry: { eq: "GLOBAL" } }
      ]},
      { _or: [
        { targetRole: { eq: $role } },
        { targetRole: { isNull: true } }
      ]}
    ]
  }, orderBy: [{ createdAt: DESC }]) {
    id
    title
    message
    targetCountry
    targetRegion
    targetCity
    targetRole
    createdAt
  }
}

query GetFinanceStats($start: Timestamp, $end: Timestamp) @auth(level: NO_ACCESS) {
  walletTransactions(where: {
    _and: [
      { createdAt: { ge: $start } },
      { createdAt: { le: $end } }
    ]
  }, orderBy: [{ createdAt: DESC }]) {
    id
    amount
    type
    description
    invoiceNumber
    isRefunded
    parentTransactionId
    createdAt
    user { id email name }
  }
}

# --- 7. Analytics & advanced Governance ---

query GetAnalyticsSnapshots($start: Date, $end: Date) @auth(level: NO_ACCESS) {
  analyticsSnapshots(where: {
    _and: [
      { date: { ge: $start } },
      { date: { le: $end } }
    ]
  }, orderBy: [{ date: DESC }]) {
    id
    date
    totalUsers
    totalRevenue
    tokensBurned
    activeRequests
    topSectorId
  }
}

query GetAppConfig($key: String!) @auth(level: PUBLIC) {
  appConfig(key: { key: $key }) {
    key
    value
  }
}

query ListAppConfigs @auth(level: NO_ACCESS) {
  appConfigs {
    key
    value
  }
}

query ListServiceMetrics @auth(level: NO_ACCESS) {
  serviceMetrics {
    serviceId
    views
    contacts
    shares
    updatedAt
    service {
      titleEn
      provider { name }
    }
  }
}

query GetServiceMetric($serviceId: UUID!) @auth(level: PUBLIC) {
  serviceMetric(key: { serviceId: $serviceId }) {
    views
    contacts
    shares
    updatedAt
  }
}
