# ESPY PROTOCOL - DATA CONNECT QUERIES v9.0

# --- 1. Identity & Profile ---

query GetUser($uid: String!) @auth(expr: "auth.uid == uid") {
  user(key: { id: $uid }) {
    id
    email
    name
    role
    walletBalance
    tokensUsed
    photoUrl
    isActive
    createdAt
    updatedAt
    professionalProfile_on_user {
      specialty
      isApproved
      isProfileValidated
      membershipTier
      visibilityExpiresAt
    }
    institutionProfile_on_user {
      nameAr
      isApproved
      isProfileValidated
      visibilityExpiresAt
    }
    visitorProfile_on_user {
      interests
    }
  }
}

query GetProfessionalDetails($uid: String!) @auth(level: PUBLIC) {
  professionalProfile(key: { id: $uid }) {
    id
    fullNameAr
    specialty
    specialtyAr
    bioEn
    bioAr
    isApproved
    isHonorVerified
    isProfileValidated
    membershipTier
    serviceSlots
    practicePins
    visibilityExpiresAt
    user {
      email
      photoUrl
      whatsapp
    }
  }
}

# --- 2. Discovery & Search ---

query ListSectors @auth(level: PUBLIC) {
  sectors(orderBy: [{ displayOrder: ASC }]) {
    id
    nameEn
    nameAr
    iconName
    colorHex
    description
    template {
      accentColor
      iconName
      visibleFields
    }
  }
}

query ListCategories($sectorId: String) @auth(level: PUBLIC) {
  categories(where: { sector: { id: { eq: $sectorId } } }) {
    id
    nameEn
    nameAr
    targetRole
  }
}

query ListRegions($countryId: String!) @auth(level: PUBLIC) {
  regions(where: { country: { id: { eq: $countryId } } }) {
    id
    nameEn
    nameAr
    regionCode
  }
}

query ListCities($regionId: String!) @auth(level: PUBLIC) {
  cities(where: { region: { id: { eq: $regionId } } }) {
    id
    nameEn
    nameAr
    lat
    lng
  }
}

query ListMetadataTags @auth(level: PUBLIC) {
  serviceTags { id nameEn nameAr }
  priceTags { id nameEn nameAr category }
  pinCategories { id nameEn nameAr iconBase }
  presenceTags { id nameEn nameAr }
}

query ListActiveServices($categoryId: String, $sectorId: String) @auth(level: PUBLIC) {
  services(where: {
    _and: [
      { isActive: { eq: true } },
      { moderationStatus: { eq: APPROVED } },
      { category: { id: { eq: $categoryId } } },
      { sector: { id: { eq: $sectorId } } },
      { visibilityExpiresAt: { gt_expr: "request.time" } }
    ]
  }) {
    id
    titleEn
    titleAr
    price
    imageUrl
    deliveryMode
    priceTag { nameEn nameAr }
    sector {
      template {
        accentColor
        iconName
        visibleFields
      }
    }
    serviceListingTags_on_service {
      tag { nameEn nameAr }
    }
    provider {
      id
      name
      photoUrl
    }
  }
}

query ListCountries @auth(level: PUBLIC) {
  countries {
    id
    nameEn
    nameAr
    flagEmoji
    isoCode
    currency
  }
}

query ListLocationNodes($userId: String!) @auth(level: PUBLIC) {
  locationNodes(where: { user: { id: { eq: $userId } } }) {
    id
    label
    city { nameEn nameAr }
    lat
    lng
    isMain
  }
}

# --- 3. Interactions & Community ---

query ListInteractions($actorId: String!, $type: InteractionType!) @auth(expr: "auth.uid == actorId") {
  interactions(where: {
    _and: [
      { actor: { id: { eq: $actorId } } },
      { type: { eq: $type } }
    ]
  }) {
    targetId
  }
}

query ListServiceRequests($sectorId: String, $status: CommunityRequestStatus = ACTIVE) @auth(level: USER) {
  serviceRequests(
    where: {
      _and: [
        { status: { eq: $status } },
        { moderationStatus: { eq: APPROVED } },
        { sector: { id: { eq: $sectorId } } }
      ]
    },
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    descriptionEn
    descriptionAr
    urgency
    preferredMode
    status
    createdAt
    user {
      name
    }
    sector {
      template {
        accentColor
        iconName
        visibleFields
      }
    }
    serviceRequestTags_on_request {
      tag { nameEn nameAr }
    }
  }
}

# --- 4. Administration & Audit ---

query SearchUsersAdmin($query: String, $role: UserRole, $hasProfile: Boolean, $isActive: Boolean) @auth(level: NO_ACCESS) {
  users(
    where: {
      _and: [
        { email: { contains: $query } },
        { role: { eq: $role } },
        { hasProfile: { eq: $hasProfile } },
        { isActive: { eq: $isActive } }
      ]
    },
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    email
    name
    role
    isActive
    hasProfile
    phone
    whatsapp
    createdAt
  }
}

query GetAuditDetails($id: String!) @auth(level: NO_ACCESS) {
  user(key: { id: $id }) {
    id
    email
    name
    role
    isActive
    hasProfile
    photoUrl
    phone
    whatsapp
    walletBalance
    adminNotes
    createdAt
    updatedAt
    professionalProfile_on_user {
      fullNameAr
      specialty
      isApproved
      isProfileValidated
      verificationDocUrl
      membershipTier
      visibilityExpiresAt
    }
    institutionProfile_on_user {
      nameAr
      registrationNumber
      isApproved
      isProfileValidated
      verificationDocUrl
      visibilityExpiresAt
    }
    walletTransactions_on_user(orderBy: [{ createdAt: DESC }], limit: 10) {
      id
      amount
      type
      description
      createdAt
    }
  }
}

# --- Moderation Queue ---

query ListServiceModerationQueue($status: ModerationStatus = PENDING) @auth(level: NO_ACCESS) {
  services(where: { moderationStatus: { eq: $status } }, orderBy: [{ createdAt: DESC }]) {
    id
    titleEn
    titleAr
    price
    imageUrl
    deliveryMode
    moderationStatus
    flagReason
    category { nameEn nameAr }
    sector {
      id
      nameEn
      nameAr
      template { accentColor iconName visibleFields }
    }
    provider { id name photoUrl email }
  }
}

query ListRequestModerationQueue($status: ModerationStatus = PENDING) @auth(level: NO_ACCESS) {
  serviceRequests(where: { moderationStatus: { eq: $status } }, orderBy: [{ createdAt: DESC }]) {
    id
    descriptionEn
    descriptionAr
    urgency
    preferredMode
    status
    moderationStatus
    flagReason
    createdAt
    sector {
      id
      nameEn
      nameAr
      template { accentColor iconName visibleFields }
    }
    user { id name email }
  }
}

query ListTemplates @auth(level: PUBLIC) {
  templates {
    id
    accentColor
    iconName
    visibleFields
    configJson
  }
}
