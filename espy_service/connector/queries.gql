# ESPY PROTOCOL - DATA CONNECT QUERIES v6.2

# --- 1. Identity & Profile ---

query GetUser($uid: String!) @auth(expr: "auth.uid == uid") {
  user(key: { id: $uid }) {
    id
    email
    name
    role
    walletBalance
    photoUrl
    isActive
    professionalProfile_on_user {
      specialty
      isApproved
      isProfileValidated
      membershipTier
      visibilityExpiresAt
    }
    institutionProfile_on_user {
      nameAr
      isApproved
      isProfileValidated
      visibilityExpiresAt
    }
  }
}

query GetProfessionalDetails($uid: String!) @auth(level: PUBLIC) {
  professionalProfile(key: { id: $uid }) {
    id
    fullNameAr
    specialty
    specialtyAr
    bioEn
    bioAr
    isApproved
    isHonorVerified
    isProfileValidated
    membershipTier
    serviceSlots
    practicePins
    visibilityExpiresAt
    user {
      email
      photoUrl
      whatsapp
    }
  }
}

# --- 2. Discovery & Search ---

query ListSectors @auth(level: PUBLIC) {
  sectors(orderBy: [{ displayOrder: ASC }]) {
    id
    nameEn
    nameAr
    displayOrder
  }
}

query ListCategories($sectorId: String) @auth(level: PUBLIC) {
  categories(where: { sector: { id: { eq: $sectorId } } }) {
    id
    nameEn
    nameAr
    targetRole
  }
}

query ListActiveServices($categoryId: String) @auth(level: PUBLIC) {
  services(where: {
    _and: [
      { isActive: { eq: true } },
      { category: { id: { eq: $categoryId } } },
      { visibilityExpiresAt: { gt_expr: "request.time" } }
    ]
  }) {
    id
    titleEn
    titleAr
    descriptionEn
    price
    imageUrl
    provider {
      id
      name
      photoUrl
    }
  }
}

query SearchServices($query: String, $minPrice: Int, $maxPrice: Int) @auth(level: PUBLIC) {
  services(where: {
    _and: [
      { isActive: { eq: true } },
      { titleEn: { contains: $query } },
      { price: { ge: $minPrice } },
      { price: { le: $maxPrice } },
      { visibilityExpiresAt: { gt_expr: "request.time" } }
    ]
  }) {
    id
    titleEn
    price
    imageUrl
    provider {
      id
      name
    }
  }
}

query ListCountries @auth(level: PUBLIC) {
  countries {
    id
    nameEn
    nameAr
    flagEmoji
  }
}

query ListLocationNodes($userId: String!) @auth(level: PUBLIC) {
  locationNodes(where: { user: { id: { eq: $userId } } }) {
    id
    label
    cityName
    lat
    lng
    isMain
  }
}

# --- 3. Interactions & Community ---

query ListFavoriteIds($actorId: String!) @auth(expr: "auth.uid == actorId") {
  interactions(where: {
    _and: [
      { actor: { id: { eq: $actorId } } },
      { type: { eq: FAVORITE } }
    ]
  }) {
    targetId
  }
}

query ListContactedIds($actorId: String!) @auth(expr: "auth.uid == actorId") {
  interactions(where: {
    _and: [
      { actor: { id: { eq: $actorId } } },
      { type: { eq: CONTACT } }
    ]
  }) {
    targetId
  }
}

query ListCommunityRequests($sectorId: String, $status: CommunityRequestStatus = ACTIVE) @auth(level: USER) {
  communityRequests(
    where: {
      _and: [
        { status: { eq: $status } },
        { sector: { id: { eq: $sectorId } } }
      ]
    },
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    title
    description
    locationLabel
    status
    createdAt
    user {
      name
    }
  }
}

# --- 4. Ledger & Resource Orders ---

query GetWalletTransactions($userId: String!) @auth(expr: "auth.uid == userId") {
  walletTransactions(where: { user: { id: { eq: $userId } } }, orderBy: [{ createdAt: DESC }]) {
    id
    type
    amount
    referenceId
    description
    createdAt
  }
}

query GetActiveResourceOrder($userId: String!) @auth(expr: "auth.uid == userId") {
  resourceOrders(where: {
    _and: [
      { user: { id: { eq: $userId } } },
      { status: { ne: PAID } },
      { status: { ne: CANCELLED } }
    ]
  }, orderBy: [{ createdAt: DESC }], limit: 1) {
    id
    pinsCount
    slotsCount
    broadcastsCount
    totalCost
    status
    createdAt
  }
}

# --- 5. Administration & Audit ---

query ListAllUsers @auth(level: NO_ACCESS) {
  users(orderBy: [{ createdAt: DESC }]) {
    id
    email
    name
    role
    isActive
    hasProfile
    phone
    whatsapp
    createdAt
  }
}

query GetUserDetails($id: String!) @auth(level: NO_ACCESS) {
  user(key: { id: $id }) {
    id
    email
    name
    role
    isActive
    hasProfile
    photoUrl
    phone
    whatsapp
    walletBalance
    createdAt
    updatedAt
    professionalProfile_on_user {
      fullNameAr
      specialty
      isApproved
      isProfileValidated
      verificationDocUrl
      membershipTier
      visibilityExpiresAt
    }
    institutionProfile_on_user {
      nameAr
      registrationNumber
      isApproved
      isProfileValidated
      verificationDocUrl
      visibilityExpiresAt
    }
  }
}

