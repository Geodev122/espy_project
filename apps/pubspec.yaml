name: espy_pro
description: Espy Professional & Institution App # Re-triggering pub get
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_core:
    path: ../../packages/shared_core
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  firebase_storage: ^13.4.1
  cloud_functions: ^6.3.1
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  provider: ^6.1.2
  google_fonts: ^8.1.0
  shared_preferences: ^2.5.5
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.68.0
  lucide_icons_flutter: ^3.1.14+2
  url_launcher: ^6.3.2
  cupertino_icons: ^1.0.6
  intl: 0.20.2
  geolocator: ^14.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geocoding: ^4.0.0
  geoflutterfire_plus: ^0.0.34
  image_picker: ^1.2.2
  cached_network_image: ^3.3.1
  flutter_staggered_animations: ^1.0.0
  flutter_spinkit: ^5.2.1
  flutter_card_swiper: ^7.0.0
  glassmorphism: ^3.0.0
  animate_do: ^5.1.0
  google_sign_in: ^6.2.1
  flutter_native_splash: ^2.4.0
  package_info_plus: ^10.1.0
  image_cropper: ^12.2.1
  audioplayers: ^6.1.0
  web: ^1.1.0
  flutter_localizations:
    sdk: flutter
  pay: ^3.3.0
  file_picker: ^3.0.4
  webview_flutter: ^4.13.1
  share_plus: ^13.1.0
  rxdart: ^0.28.0
  pdf: ^3.11.1
  printing: ^5.13.3

dev_dependencies:
  intl_utils: 2.8.14
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  xml: 6.3.0
  image: 4.2.0
  cli_util: 0.5.1
  dbus: 0.7.13
  matcher: 0.12.20
  meta: 1.18.2
  test_api: 0.7.12
  vector_math: 2.3.0

flutter_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/images/espy_icon.png"
    background_color: "#0A192F"
    theme_color: "#0A192F"
  image_path: "assets/images/espy_icon.png"
  adaptive_icon_background: "#0A192F"
  adaptive_icon_foreground: "assets/images/espy_icon.png"

flutter_native_splash:
  color: "#0A192F"
  image: assets/images/espy_icon.png
  android_12:
    image: assets/images/espy_icon.png
    color: "#0A192F"
  fullscreen: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
    - assets/google_pay_config.json
flutter_intl:
  enabled: true
