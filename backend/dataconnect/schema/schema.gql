# 🛡️ Espy Protocol Unified Relational Schema v4.0 (Unified App & Admin)

# ─── 1. Identity & Access ────────────────────────────────────────────────

type User @table {
  id: String! @primaryKey # Firebase UID
  email: String! @unique
  name: String
  role: String! # visitor, professional, institution, admin
  isActive: Boolean! @default(value: true)
  hasProfile: Boolean! @default(value: false)
  walletBalance: Int! @default(value: 0)
  tokensUsed: Int! @default(value: 0)
  photoUrl: String
  lastActiveAt: Timestamp @default(expr: "request.time")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type Professional @table {
  id: String! @primaryKey # Matches User ID
  user: User! @onDelete(cascade: true)
  fullNameEn: String
  fullNameAr: String
  specialty: String
  specialtyAr: String
  bioEn: String
  bioAr: String
  whatsapp: String
  isApproved: Boolean! @default(value: false)
  isHonorVerified: Boolean! @default(value: false)
  isFeatured: Boolean! @default(value: false)
  averageRating: Float @default(value: 0.0)
  reviewCount: Int @default(value: 0)
  countryId: String
  governorateId: String
  cityId: String
  serviceSlots: Int! @default(value: 2)
  practicePins: Int! @default(value: 0)
  broadcastsBought: Int! @default(value: 0)
  broadcastsUsed: Int! @default(value: 0)
  visibilityExpiresAt: Timestamp
}

type Institution @table {
  id: String! @primaryKey # Matches User ID
  user: User! @onDelete(cascade: true)
  nameEn: String
  nameAr: String
  category: String
  registrationNumber: String
  isApproved: Boolean! @default(value: false)
  isFeatured: Boolean! @default(value: false)
  averageRating: Float @default(value: 0.0)
  reviewCount: Int @default(value: 0)
  serviceSlots: Int! @default(value: 5)
  practicePins: Int! @default(value: 0)
  visibilityExpiresAt: Timestamp
}

type Visitor @table {
  id: String! @primaryKey # Matches User ID
  user: User! @onDelete(cascade: true)
  interests: [String]
}

# ─── 2. Taxonomy & Discovery ──────────────────────────────────────────────

type Sector @table {
  id: String! @primaryKey
  nameEn: String!
  nameAr: String
  displayOrder: Int @default(value: 999)
  isActive: Boolean! @default(value: true)
}

type Category @table {
  id: String! @primaryKey
  parentSector: Sector
  nameEn: String!
  nameAr: String
  type: String! # professional, institution
  displayOrder: Int @default(value: 999)
  isActive: Boolean! @default(value: true)
}

type Service @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  provider: User!
  titleEn: String!
  titleAr: String
  descriptionEn: String
  descriptionAr: String
  price: Int!
  category: Category
  isActive: Boolean! @default(value: true)
  isAllocated: Boolean! @default(value: false)
  visibilityExpiresAt: Timestamp
  imageUrl: String
  averageRating: Float @default(value: 0.0)
  reviewCount: Int @default(value: 0)
}

type LocationNode @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  user: User!
  isMain: Boolean! @default(value: false)
  isVerified: Boolean! @default(value: false)
  label: String
  cityName: String
  countryId: String
  lat: Float!
  lng: Float!
  activity: String
}

# ─── 3. Reputation & Feedback ───────────────────────────────────────────

type Review @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  author: User!
  targetUser: User # If reviewing a professional/institution
  targetService: Service # If reviewing a specific service
  rating: Int! # 1-5
  comment: String
  isApproved: Boolean! @default(value: true)
  createdAt: Timestamp! @default(expr: "request.time")
}

type Report @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  reporter: User!
  targetId: String! # UID, Service ID, or Request ID
  targetType: String! # USER, SERVICE, REQUEST
  reason: String!
  status: String! @default(value: "pending") # pending, resolved, dismissed
  adminNote: String
  createdAt: Timestamp! @default(expr: "request.time")
}

# ─── 4. Operations & Ledger ───────────────────────────────────────────────

type WalletLedger @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  user: User!
  type: String! # credit, debit
  amount: Int!
  itemId: String
  description: String
  timestamp: Timestamp! @default(expr: "request.time")
}

type RechargeCard @table {
  id: String! @primaryKey # Code
  tokenValue: Int!
  extraPins: Int @default(value: 0)
  extraSlots: Int @default(value: 0)
  broadcasts: Int @default(value: 0)
  targetRole: String @default(value: "any")
  status: String! @default(value: "active") # active, used
  redeemedBy: User
  redeemedAt: Timestamp
}

type ExternalTransaction @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  user: User!
  amount: Float!
  currency: String! @default(value: "USD")
  gateway: String! # whish, google_pay
  status: String! # pending, completed, failed
  externalId: String # Gateway reference
  metadata: String # JSON payload
  createdAt: Timestamp! @default(expr: "request.time")
}

type Match @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  visitor: User!
  professional: User!
  status: String! # requested, accepted, rejected
  createdAt: Timestamp! @default(expr: "request.time")
}

type Interaction @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  user: User!
  targetId: String! # UID, Service ID, or Request ID
  type: String! # view, favorite, swipe_right, skip, respond
  createdAt: Timestamp! @default(expr: "request.time")
}

# ─── 5. Communications & Community ────────────────────────────────────────

type CommunityRequest @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  user: User!
  title: String!
  description: String!
  sector: Sector
  locationLabel: String
  whatsapp: String
  status: String! @default(value: "active") # active, fulfilled, expired
  createdAt: Timestamp! @default(expr: "request.time")
}

type SOSAlert @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  user: User!
  lat: Float!
  lng: Float!
  status: String! @default(value: "active") # active, resolved
  timestamp: Timestamp! @default(expr: "request.time")
}

type Broadcast @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  sender: User!
  title: String!
  message: String!
  targetCountry: String @default(value: "GLOBAL")
  reachCount: Int @default(value: 0)
  status: String! @default(value: "queued") # queued, sent
  createdAt: Timestamp! @default(expr: "request.time")
}

type Announcement @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  titleEn: String!
  titleAr: String
  contentEn: String!
  contentAr: String
  category: String! # general, health, system
  status: String! @default(value: "approved")
  targetRole: String # null for all, or visitor/pro
  createdAt: Timestamp! @default(expr: "request.time")
}

type SystemNotification @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  recipient: User!
  title: String!
  message: String!
  type: String!
  isRead: Boolean! @default(value: false)
  timestamp: Timestamp! @default(expr: "request.time")
}

type EmergencyHotline @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  countryId: String!
  nameEn: String!
  nameAr: String
  number: String!
  category: String # Medical, Security, Fire
  displayOrder: Int @default(value: 999)
}

type SupportTicket @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  user: User!
  subject: String!
  message: String!
  status: String! @default(value: "open") # open, closed, pending
  createdAt: Timestamp! @default(expr: "request.time")
}

# ─── 6. Administration & Marketing ────────────────────────────────────────

type AdminLog @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  admin: User!
  action: String! # APPROVE_PROFILE, SUSPEND_USER, etc.
  entityId: String!
  entityType: String!
  details: String
  oldValue: String
  newValue: String
  timestamp: Timestamp! @default(expr: "request.time")
}

type AppConfig @table {
  key: String! @primaryKey
  value: String! # JSON payload
}

type Promotion @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  titleEn: String!
  titleAr: String
  descriptionEn: String
  descriptionAr: String
  imageUrl: String
  linkUrl: String
  type: String! # banner, popup, featured_list
  targetRole: String # visitor, professional, institution
  isActive: Boolean! @default(value: true)
  expiresAt: Timestamp
  priority: Int @default(value: 0)
}

type AnalyticsEvent @table {
  id: UUID! @default(expr: "uuidV4()") @primaryKey
  user: User
  eventType: String! # PAGE_VIEW, BUTTON_CLICK, SEARCH
  eventKey: String!
  metadata: String # JSON
  timestamp: Timestamp! @default(expr: "request.time")
}
