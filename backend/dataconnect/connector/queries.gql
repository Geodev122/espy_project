# 🛡️ Espy Protocol DataConnect Queries v3.3

# ─── 1. Identity & Profile ────────────────────────────────────────────────

query GetUser($uid: String!) {
  user(id: $uid) {
    id
    email
    name
    role
    walletBalance
    photoUrl
    hasProfile
    isActive
    providerInfo {
      fullNameEn
      specialty
      isApproved
      visibilityExpiresAt
    }
  }
}

query GetProfessionalDetails($uid: String!) {
  professional(id: $uid) {
    id
    fullNameEn
    fullNameAr
    specialty
    specialtyAr
    bioEn
    bioAr
    whatsapp
    isApproved
    isHonorVerified
    visibilityExpiresAt
    serviceSlots
    practicePins
    user {
      email
      photoUrl
    }
  }
}

# ─── 2. Discovery & Search ────────────────────────────────────────────────

query ListActiveServices($category: String) {
  services(where: {
    _and: [
      { isActive: { _eq: true } },
      { category: { id: { _eq: $category } } }
    ]
  }) {
    id
    title
    description
    price
    imageUrl
    provider {
      id
      name
      photoUrl
    }
  }
}

query SearchProviders($sectorId: String, $cityId: String) {
  professionals(
    where: {
      _and: [
        { isApproved: { _eq: true } },
        { cityId: { _eq: $cityId } }
      ]
    }
  ) {
    id
    fullNameEn
    specialty
    photoUrl
  }
}

query ListLocationNodes($userId: String!) {
  locationNodes(where: { user: { id: { _eq: $userId } } }) {
    id
    label
    cityName
    lat
    lng
    isMain
    activity
  }
}

# ─── 3. Financial & Ledger ───────────────────────────────────────────────

query GetWalletLedger($userId: String!) {
  walletLedgers(where: { user: { id: { _eq: $userId } } }, orderBy: [{ timestamp: DESC }]) {
    id
    type
    amount
    itemId
    description
    timestamp
  }
}

query GetExternalTransactions($userId: String!) {
  externalTransactions(where: { user: { id: { _eq: $userId } } }, orderBy: [{ createdAt: DESC }]) {
    id
    amount
    gateway
    status
    externalId
    createdAt
  }
}

# ─── 4. Community & Comms ────────────────────────────────────────────────

query ListCommunityRequests($sectorId: String) {
  communityRequests(
    where: {
      _and: [
        { status: { _eq: "active" } },
        { sector: { id: { _eq: $sectorId } } }
      ]
    },
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    title
    description
    locationLabel
    isSOS
    createdAt
    user { name }
  }
}

query ListMyBroadcasts($userId: String!) {
  broadcasts(where: { sender: { id: { _eq: $userId } } }, orderBy: [{ createdAt: DESC }]) {
    id
    title
    message
    status
    reachCount
    createdAt
  }
}

query ListEmergencyHotlines($countryId: String!) {
  emergencyHotlines(where: { countryId: { _eq: $countryId } }, orderBy: [{ displayOrder: ASC }]) {
    id
    nameEn
    nameAr
    number
    category
  }
}

# ─── 5. Administration & Audit ────────────────────────────────────────────

query GetSystemStats {
  users_aggregate { count }
  services_aggregate(where: { isActive: { _eq: true } }) { count }
  communityRequests_aggregate(where: { status: { _eq: "active" } }) { count }
}

query ListPendingApprovals {
  professionals(where: { isApproved: { _eq: false } }) {
    id
    fullNameEn
    user { email createdAt }
  }
}

query ListAdminLogs {
  adminLogs(orderBy: [{ timestamp: DESC }], limit: 50) {
    id
    action
    entityId
    entityType
    details
    timestamp
    admin { name }
  }
}
