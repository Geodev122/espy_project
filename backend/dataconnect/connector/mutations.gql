# 🛡️ Espy Protocol DataConnect Mutations v3.3

# ─── 1. Identity & Profile ────────────────────────────────────────────────

mutation CreateUser($id: String!, $email: String!, $name: String, $role: String!) {
  user_insert(data: {
    id: $id,
    email: $email,
    name: $name,
    role: $role
  })
}

mutation UpdateUserProfile($id: String!, $name: String, $photoUrl: String) {
  user_update(id: $id, data: {
    name: $name,
    photoUrl: $photoUrl,
    updatedAt_expr: "request.time"
  })
}

# ─── 2. Service & Discovery ────────────────────────────────────────────────

mutation CreateService($providerId: String!, $title: String!, $description: String, $price: Int!, $categoryId: String) {
  service_insert(data: {
    providerId: $providerId,
    title: $title,
    description: $description,
    price: $price,
    categoryId: $categoryId
  })
}

mutation CreateLocationNode($userId: String!, $label: String!, $lat: Float!, $lng: Float!, $isMain: Boolean!) {
  locationNode_insert(data: {
    userId: $userId,
    label: $label,
    lat: $lat,
    lng: $lng,
    isMain: $isMain
  })
}

# ─── 3. Financial Operations ──────────────────────────────────────────────

mutation LogExternalTransaction($userId: String!, $amount: Float!, $gateway: String!, $externalId: String, $status: String!) {
  externalTransaction_insert(data: {
    userId: $userId,
    amount: $amount,
    gateway: $gateway,
    externalId: $externalId,
    status: $status
  })
}

mutation SpendTokens($userId: String!, $cost: Int!, $itemId: String!, $description: String!) {
  user_update(id: $userId, data: {
    walletBalance_expr: "walletBalance - $cost",
    tokensUsed_expr: "tokensUsed + $cost",
    updatedAt_expr: "request.time"
  })
  walletLedger_insert(data: {
    userId: $userId,
    type: "debit",
    amount: $cost,
    itemId: $itemId,
    description: $description
  })
}

# ─── 4. Community & Interaction ───────────────────────────────────────────

mutation PostCommunityRequest($userId: String!, $title: String!, $description: String!, $sectorId: String, $whatsapp: String) {
  communityRequest_insert(data: {
    userId: $userId,
    title: $title,
    description: $description,
    sectorId: $sectorId,
    whatsapp: $whatsapp
  })
}

mutation CreateBroadcast($senderId: String!, $title: String!, $message: String!, $targetCountry: String) {
  broadcast_insert(data: {
    senderId: $senderId,
    title: $title,
    message: $message,
    targetCountry: $targetCountry
  })
}

mutation RecordInteraction($userId: String!, $targetId: String!, $type: String!) {
  interaction_insert(data: {
    userId: $userId,
    targetId: $targetId,
    type: $type
  })
}

# ─── 5. Administration ────────────────────────────────────────────────────

mutation ApproveProfessional($id: String!, $isApproved: Boolean!) {
  professional_update(id: $id, data: {
    isApproved: $isApproved
  })
  user_update(id: $id, data: {
    hasProfile: true,
    updatedAt_expr: "request.time"
  })
}

mutation LogAdminAction($adminId: String!, $action: String!, $entityId: String!, $entityType: String!, $details: String) {
  adminLog_insert(data: {
    adminId: $adminId,
    action: $action,
    entityId: $entityId,
    entityType: $entityType,
    details: $details
  })
}
