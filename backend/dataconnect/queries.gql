# Espy Protocol DataConnect Queries

# ─── 1. Identity Queries ──────────────────────────────────────────────────

query GetUser($uid: String!) {
  user(id: $uid) {
    id
    email
    name
    role
    walletBalance
    photoUrl
    hasProfile
    isActive
  }
}

query GetProfessional($uid: String!) {
  professional(id: $uid) {
    id
    fullNameEn
    fullNameAr
    specialty
    specialtyAr
    bioEn
    bioAr
    isApproved
    isHonorVerified
    user {
      email
      photoUrl
    }
  }
}

# ─── 2. Discovery Queries ──────────────────────────────────────────────────

query ListActiveServices {
  services(where: { isActive: { _eq: true } }) {
    id
    title
    description
    price
    category
    provider {
      id
      name
      photoUrl
    }
  }
}

query SearchProfessionals($specialty: String, $cityId: String) {
  professionals(
    where: {
      _and: [
        { isApproved: { _eq: true } },
        { specialty: { _eq: $specialty } },
        { cityId: { _eq: $cityId } }
      ]
    }
  ) {
    id
    fullNameEn
    specialty
    photoUrl
  }
}

# ─── 3. Transactions & Interactions ────────────────────────────────────────

query GetUserTransactions($uid: String!) {
  transactions(where: { user: { id: { _eq: $uid } } }, orderBy: [{ createdAt: DESC }]) {
    id
    amount
    packageId
    status
    gateway
    createdAt
  }
}

# ─── 4. Administration Queries ───────────────────────────────────────────

query ListPendingApprovals {
  professionals(where: { isApproved: { _eq: false } }) {
    id
    fullNameEn
    specialty
    user {
      email
      photoUrl
    }
  }
}

query GetSystemStats {
  users_aggregate {
    count
  }
  services_aggregate(where: { isActive: { _eq: true } }) {
    count
  }
}

query ListAdminLogs {
  adminLogs(orderBy: [{ timestamp: DESC }], limit: 100) {
    id
    action
    entityId
    entityType
    details
    timestamp
    admin { name }
  }
}

query ListSupportTickets($status: String) {
  supportTickets(where: { status: { _eq: $status } }, orderBy: [{ createdAt: DESC }]) {
    id
    subject
    message
    status
    user { name email }
    createdAt
  }
}

# ─── 5. Community & Emergency Queries ─────────────────────────────────────

query ListAnnouncements($status: String) {
  announcements(where: { status: { _eq: $status } }, orderBy: [{ createdAt: DESC }]) {
    id
    title
    content
    category
    createdAt
  }
}

query ListEmergencyHotlines($countryId: String!) {
  emergencyHotlines(where: { countryId: { _eq: $countryId } }, orderBy: [{ displayOrder: ASC }]) {
    id
    nameEn
    nameAr
    number
    category
  }
}

query ListSectors {
  sectors(where: { isActive: { _eq: true } }, orderBy: [{ displayOrder: ASC }]) {
    id
    nameEn
    nameAr
  }
}
